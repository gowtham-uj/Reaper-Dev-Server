# Reaper terminal capability contract for xterm.js viewers.
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",xterm-256color:Tc"
# Keep browser viewers in the primary buffer so xterm.js owns scrollback.
set -as terminal-overrides ",xterm*:smcup@:rmcup@"
set -as terminal-features ",xterm-256color:RGB"
set -g focus-events on
set -g extended-keys on
set -g allow-passthrough on
# Leave pointer scrolling to xterm.js instead of tmux copy mode.
set -g mouse off
set -g set-clipboard on
set -g escape-time 10
set -g history-limit 50000
set -g status-position bottom
set -g status-style "bg=#151519,fg=#a1a1aa"
set -g message-style "bg=#232329,fg=#f1f1f3"
set -g mode-style "bg=#3a3a43,fg=#ffffff"
